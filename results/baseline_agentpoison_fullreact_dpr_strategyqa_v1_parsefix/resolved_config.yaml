mismatch_policy: Fullreact baseline uses the official ReAct-StrategyQA agent loop
  and upstream DPR retrieval path, but stages a labeled StrategyQA train subset as
  a dev-compatible file and routes LLM calls through the minimax27 provider profile
  instead of the upstream hard-coded OpenAI setup.
